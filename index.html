<!DOCTYPE html>
<html>
<head>
  <title>TRON Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@walletconnect/sign-client@2.11.0/dist/index.umd.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      color: white;
      cursor: pointer;
    }

    .connect {
      background: #3b82f6;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>TRON Payment</h2>

    <button class="connect" onclick="connectWallet()">Connect Trust Wallet</button>

    <input type="number" id="amount" placeholder="Enter USDT Amount" />

    <button onclick="sendPayment()">Pay Now</button>

    <p id="status"></p>
  </div>

<script>
let client;
let session;
const receiver = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
const projectId = "171db6da15a54effc1b4a06f889a3c3f";

// TRON USDT Contract
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

async function init() {
  client = await window.SignClient.init({
    projectId,
    metadata: {
      name: "TRON Pay",
      description: "Payment DApp",
      url: window.location.origin,
      icons: ["https://trustwallet.com/assets/images/media/assets/TWT.png"]
    }
  });
}

async function connectWallet() {
  document.getElementById("status").innerText = "Connecting...";

  const { uri, approval } = await client.connect({
    requiredNamespaces: {
      tron: {
        methods: ["tron_signTransaction"],
        chains: ["tron:0x2b6653dc"], // TRON mainnet
        events: []
      }
    }
  });

  if (uri) {
    // Deep link → Trust Wallet
    const deepLink = "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
    window.location.href = deepLink;
  }

  session = await approval();
  document.getElementById("status").innerText = "Connected!";
}

async function sendPayment() {
  if (!session) {
    alert("Connect wallet first");
    return;
  }

  const amount = document.getElementById("amount").value;
  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  document.getElementById("status").innerText = "Preparing transaction...";

  const sender = session.namespaces.tron.accounts[0].split(":")[2];

  // Convert amount to SUN (6 decimals for USDT)
  const amountSun = (parseFloat(amount) * 1e6).toString(16);

  const data =
    "a9059cbb" +
    receiver.replace(/^T/, "").padStart(64, "0") +
    parseInt(amount * 1e6).toString(16).padStart(64, "0");

  const tx = {
    from: sender,
    to: USDT_CONTRACT,
    data: "0x" + data
  };

  try {
    const result = await client.request({
      topic: session.topic,
      chainId: "tron:0x2b6653dc",
      request: {
        method: "tron_signTransaction",
        params: tx
      }
    });

    document.getElementById("status").innerText = "Transaction Sent!";
    console.log(result);

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Failed / Rejected";
  }
}

init();
</script>

</body>
</html>
