<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Approval Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/@tronweb-lib/utils/dist/TronWebUtils.umd.js"></script>
    <script src="https://unpkg.com/tronweb@5.3.2/dist/TronWeb.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>USDT Unlimited Approval (TRC-20)</h1>
    <p>Connect your Trust Wallet (TronLink) and approve unlimited USDT for spender.</p>
    
    <div>
        <label>Spender Address:</label>
        <input type="text" id="spender" placeholder="TSpenderAddressHere" style="width: 100%; padding: 8px; margin: 10px 0; font-size: 14px;">
    </div>
    
    <button id="connectBtn">Connect Wallet</button>
    <button id="approveBtn" disabled>Approve Unlimited USDT</button>
    
    <div id="status"></div>

    <script>
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // Official USDT TRC-20
        const UNLIMITED_ALLOWANCE = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        
        let tronWeb = null;
        let userAddress = null;

        // Status update function
        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = type;
        }

        // Connect wallet
        async function connectWallet() {
            if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
                tronWeb = window.tronWeb;
                userAddress = tronWeb.defaultAddress.base58;
                updateStatus(`Connected: ${userAddress}`, 'success');
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('approveBtn').disabled = false;
                return true;
            }
            
            updateStatus('Please install TronLink/Trust Wallet extension and refresh.', 'error');
            setTimeout(() => {
                window.tronWeb && window.tronWeb.request({ method: 'tron_requestAccounts' });
            }, 500);
            return false;
        }

        // Approve USDT
        async function approveUSDT() {
            const spender = document.getElementById('spender').value.trim();
            if (!spender || !tronWeb.utils.isAddress(spender)) {
                updateStatus('Invalid spender address', 'error');
                return;
            }

            try {
                updateStatus('Creating approval transaction...', 'info');
                
                const contract = await tronWeb.contract().at(USDT_CONTRACT);
                
                // Build exact approval transaction matching TronScan format
                const transaction = await contract.approve(spender, UNLIMITED_ALLOWANCE).build();
                
                updateStatus('Transaction built. Signing and broadcasting...', 'info');
                
                // Sign and broadcast
                const signedTxn = await tronWeb.trx.sign(transaction);
                const result = await tronWeb.trx.sendRawTransaction(signedTxn);
                
                if (result.result) {
                    updateStatus(`✅ Success! TxID: ${result.txid} | View: https://tronscan.org/#/transaction/${result.txid}`, 'success');
                } else {
                    updateStatus(`❌ Failed: ${JSON.stringify(result)}`, 'error');
                }
            } catch (error) {
                updateStatus(`❌ Error: ${error.message}`, 'error');
                console.error('Full error:', error);
            }
        }

        // Event listeners
        document.getElementById('connectBtn').addEventListener('click', connectWallet);
        document.getElementById('approveBtn').addEventListener('click', approveUSDT);

        // Auto-connect on load
        window.addEventListener('load', () => {
            setTimeout(connectWallet, 1000);
        });

        // Listen for wallet events
        if (window.tronWeb) {
            window.tronWeb.on('accountChanged', () => location.reload());
        }
    </script>
</body>
</html>
