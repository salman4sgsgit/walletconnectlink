<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trust Wallet WC Deep Link</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    a {
      color: #38bdf8;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Trust Wallet Deep Link</h2>

  <input id="wc" placeholder="Paste WalletConnect URI" />

  <button onclick="generate()">Generate Link</button>

  <p id="output"></p>

  <button onclick="openWallet()">Open in Trust Wallet</button>
</div>

<script>
  let deepLink = "";

  function generate() {
    const wc = document.getElementById("wc").value.trim();

    if (!wc.startsWith("wc:")) {
      alert("Invalid WalletConnect URI");
      return;
    }

    // Encode WC URI
    const encoded = encodeURIComponent(wc);

    // Trust Wallet deep link format
    deepLink = `https://link.trustwallet.com/wc?uri=${encoded}`;

    document.getElementById("output").innerHTML =
      `<a href="${deepLink}" target="_blank">${deepLink}</a>`;
  }

  function openWallet() {
    if (!deepLink) {
      alert("Generate link first");
      return;
    }
    window.location.href = deepLink;
  }
</script>

</body>
</html>
