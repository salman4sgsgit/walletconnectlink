<!DOCTYPE html>
<html>
<head>
  <title>Send USDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0b0f1a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .header {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .card {
      background: #121826;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 15px;
    }

    .label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 5px;
    }

    .value {
      font-size: 16px;
      word-break: break-all;
    }

    .amount {
      font-size: 36px;
      text-align: center;
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 100%;
    }

    .token {
      text-align: center;
      color: #9ca3af;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: #2563eb;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      color: white;
      margin-top: 20px;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #9ca3af;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">Send</div>

  <div class="card">
    <div class="label">From</div>
    <div class="value" id="from">Loading...</div>
  </div>

  <div class="card">
    <div class="label">To</div>
    <div class="value">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
  </div>

  <div class="card">
    <input id="amount" class="amount" placeholder="0" type="number" />
    <div class="token">USDT</div>
  </div>

  <button class="btn" onclick="send()">Continue</button>

  <div class="status" id="status"></div>

</div>

<script>
const RECEIVER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

// 🔥 Auto open Trust Wallet if not inside it
function openTrustWallet() {
  const url = window.location.href;
  const deepLink = "https://link.trustwallet.com/open_url?url=" + encodeURIComponent(url);
  window.location.href = deepLink;
}

// 🔥 Wait for tronWeb
async function waitForWallet() {
  for (let i = 0; i < 15; i++) {
    if (window.tronWeb && window.tronWeb.ready) return true;
    await new Promise(r => setTimeout(r, 500));
  }
  return false;
}

// 🔥 Auto fill amount from URL
function getAmountFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("amt");
}

async function init() {
  const ready = await waitForWallet();

  if (!ready) {
    document.getElementById("status").innerText =
      "Opening in Trust Wallet...";
    openTrustWallet();
    return;
  }

  const address = window.tronWeb.defaultAddress.base58;
  document.getElementById("from").innerText = address;

  // Auto-fill
  const amt = getAmountFromURL();
  if (amt) {
    document.getElementById("amount").value = amt;
  }
}

// 🔥 Send USDT
async function send() {
  const tronWeb = window.tronWeb;

  if (!tronWeb || !tronWeb.ready) {
    alert("Open in Trust Wallet");
    return;
  }

  const amountInput = document.getElementById("amount").value;

  if (!amountInput || amountInput <= 0) {
    alert("Enter amount");
    return;
  }

  const amount = parseFloat(amountInput) * 1e6;

  document.getElementById("status").innerText = "Processing...";

  try {
    const contract = await tronWeb.contract().at(USDT);

    const tx = await contract.transfer(
      RECEIVER,
      amount
    ).send();

    document.getElementById("status").innerText =
      "✅ Payment Successful";

    console.log(tx);

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "❌ Failed / Rejected";
  }
}

init();
</script>

</body>
</html>
